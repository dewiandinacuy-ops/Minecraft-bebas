name: VPS Manager Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    
    steps:
    - name: Setup Environment
      run: |
        sudo apt update
        sudo apt install -y python3-pip
        pip install python-telegram-bot

    - name: Create Bot Script
      run: |
        cat > vps_bot.py << 'EOF'
import json
import time
import os
from datetime import datetime
from telegram import Update, InlineKeyboardButton, InlineKeyboardMarkup
from telegram.ext import Application, CommandHandler, CallbackQueryHandler, ContextTypes

TOKEN = "8343206643:AAE2Z_1Ip4l8jdf71cQ3CxBx1Xkv-reFhqg"
OWNER_ID = 8028341598

user_vms = {}
user_data = {}

async def start(update: Update, context: ContextTypes.DEFAULT_TYPE):
    user_id = update.effective_user.id
    user_data[user_id] = {"name": update.effective_user.first_name}
    
    keyboard = [
        [InlineKeyboardButton("CREATE VM", callback_data="create")],
        [InlineKeyboardButton("DELETE VM", callback_data="delete")],
        [InlineKeyboardButton("MY VMS", callback_data="myvms")]
    ]
    if user_id == OWNER_ID:
        keyboard.append([InlineKeyboardButton("OWNER", callback_data="owner")])
    
    await update.message.reply_text("VPS MANAGER BOT", reply_markup=InlineKeyboardMarkup(keyboard))

async def create_vm(update: Update, context: ContextTypes.DEFAULT_TYPE):
    user_id = update.effective_user.id
    is_owner = user_id == OWNER_ID
    
    if not is_owner and len(user_vms.get(user_id, [])) >= 1:
        await update.callback_query.message.edit_text("FREE USER: Only 1 VM allowed")
        return
    
    vm_name = f"VM_{user_id}_{int(time.time())}"
    vm_info = {
        "name": vm_name,
        "os": "Ubuntu 22.04",
        "ram": "2GB" if not is_owner else "32GB",
        "cpu": "1 Core" if not is_owner else "16 Core",
        "created": datetime.now().strftime("%Y-%m-%d %H:%M:%S")
    }
    
    user_vms.setdefault(user_id, []).append(vm_info)
    await update.callback_query.message.edit_text(f"VM CREATED!\nName: {vm_name}\nOS: {vm_info['os']}\nRAM: {vm_info['ram']}\nCPU: {vm_info['cpu']}")

async def delete_vm(update: Update, context: ContextTypes.DEFAULT_TYPE):
    user_id = update.effective_user.id
    vms = user_vms.get(user_id, [])
    
    if not vms:
        await update.callback_query.message.edit_text("No VMs to delete")
        return
    
    keyboard = [[InlineKeyboardButton(vm['name'], callback_data=f"del_{vm['name']}")] for vm in vms]
    await update.callback_query.message.edit_text("Select VM to delete:", reply_markup=InlineKeyboardMarkup(keyboard))

async def confirm_delete(update: Update, context: ContextTypes.DEFAULT_TYPE):
    vm_name = update.callback_query.data.split("_")[1]
    user_id = update.effective_user.id
    
    user_vms[user_id] = [v for v in user_vms.get(user_id, []) if v["name"] != vm_name]
    await update.callback_query.message.edit_text(f"VM {vm_name} deleted!")

async def my_vms(update: Update, context: ContextTypes.DEFAULT_TYPE):
    user_id = update.effective_user.id
    vms = user_vms.get(user_id, [])
    
    if not vms:
        await update.callback_query.message.edit_text("No VMs yet")
        return
    
    msg = "YOUR VMS:\n\n"
    for i, vm in enumerate(vms, 1):
        msg += f"{i}. {vm['name']} - {vm['os']}\n"
    await update.callback_query.message.edit_text(msg)

async def owner_panel(update: Update, context: ContextTypes.DEFAULT_TYPE):
    if update.effective_user.id != OWNER_ID:
        await update.callback_query.answer("Owner only!")
        return
    
    total_users = len(user_data)
    total_vms = sum(len(vms) for vms in user_vms.values())
    
    keyboard = [
        [InlineKeyboardButton("BROADCAST", callback_data="broadcast")],
        [InlineKeyboardButton("LIST USERS", callback_data="listusers")],
        [InlineKeyboardButton("DELETE ANY VM", callback_data="delany")],
        [InlineKeyboardButton("BACK", callback_data="back")]
    ]
    
    await update.callback_query.message.edit_text(f"OWNER PANEL\nUsers: {total_users}\nVMs: {total_vms}", reply_markup=InlineKeyboardMarkup(keyboard))

async def broadcast_menu(update: Update, context: ContextTypes.DEFAULT_TYPE):
    if update.effective_user.id != OWNER_ID:
        return
    await update.callback_query.message.edit_text("Send your broadcast message:")
    context.user_data["broadcast"] = True

async def handle_broadcast(update: Update, context: ContextTypes.DEFAULT_TYPE):
    if context.user_data.get("broadcast") and update.effective_user.id == OWNER_ID:
        msg = update.message.text
        sent = 0
        for uid in user_data.keys():
            try:
                await context.bot.send_message(chat_id=uid, text=f"BROADCAST:\n{msg}")
                sent += 1
            except:
                pass
        await update.message.reply_text(f"Sent to {sent} users")
        context.user_data["broadcast"] = False

async def list_users(update: Update, context: ContextTypes.DEFAULT_TYPE):
    if update.effective_user.id != OWNER_ID:
        return
    
    if not user_data:
        await update.callback_query.message.edit_text("No users")
        return
    
    msg = "USERS:\n\n"
    for uid in user_data.keys():
        vm_count = len(user_vms.get(uid, []))
        msg += f"ID: {uid} | VMs: {vm_count}\n"
    await update.callback_query.message.edit_text(msg)

async def delete_any_vm(update: Update, context: ContextTypes.DEFAULT_TYPE):
    if update.effective_user.id != OWNER_ID:
        return
    
    all_vms = []
    for uid, vms in user_vms.items():
        for vm in vms:
            all_vms.append((uid, vm))
    
    if not all_vms:
        await update.callback_query.message.edit_text("No VMs")
        return
    
    keyboard = []
    for uid, vm in all_vms:
        keyboard.append([InlineKeyboardButton(f"{vm['name']} (User:{uid})", callback_data=f"delvm_{vm['name']}_{uid}")])
    
    await update.callback_query.message.edit_text("Select VM to delete:", reply_markup=InlineKeyboardMarkup(keyboard))

async def execute_delete_any(update: Update, context: ContextTypes.DEFAULT_TYPE):
    if update.effective_user.id != OWNER_ID:
        return
    
    data = update.callback_query.data.split("_")
    vm_name = data[1]
    target_uid = int(data[2])
    
    user_vms[target_uid] = [v for v in user_vms.get(target_uid, []) if v["name"] != vm_name]
    await update.callback_query.message.edit_text(f"VM {vm_name} deleted from user {target_uid}")

async def back(update: Update, context: ContextTypes.DEFAULT_TYPE):
    await start(update, context)

def main():
    app = Application.builder().token(TOKEN).build()
    
    app.add_handler(CommandHandler("start", start))
    app.add_handler(CallbackQueryHandler(create_vm, pattern="create"))
    app.add_handler(CallbackQueryHandler(delete_vm, pattern="delete"))
    app.add_handler(CallbackQueryHandler(my_vms, pattern="myvms"))
    app.add_handler(CallbackQueryHandler(owner_panel, pattern="owner"))
    app.add_handler(CallbackQueryHandler(broadcast_menu, pattern="broadcast"))
    app.add_handler(CallbackQueryHandler(list_users, pattern="listusers"))
    app.add_handler(CallbackQueryHandler(delete_any_vm, pattern="delany"))
    app.add_handler(CallbackQueryHandler(back, pattern="back"))
    app.add_handler(CallbackQueryHandler(confirm_delete, pattern="^del_"))
    app.add_handler(CallbackQueryHandler(execute_delete_any, pattern="^delvm_"))
    app.add_handler(MessageHandler(filters.TEXT & ~filters.COMMAND, handle_broadcast))
    
    print("Bot started...")
    app.run_polling()

if __name__ == "__main__":
    main()
EOF

    - name: Run Bot
      run: |
        python vps_bot.py &
        sleep 9999999
