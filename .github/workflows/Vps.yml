name: ULTIMATE VPS MANAGER - DIZX EDITION

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    
    steps:
      - name: Setup Environment
        run: |
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y qemu-kvm qemu-utils virtinst cloud-image-utils docker.io
          pip install python-telegram-bot asyncio aiohttp docker requests colorama

      - name: Create Ultimate Bot Script
        run: |
          cat > ultimate_vps_bot.py << 'EOF'
import json
import time
import subprocess
import os
import asyncio
import random
import string
from datetime import datetime
from telegram import Update, InlineKeyboardButton, InlineKeyboardMarkup, ParseMode
from telegram.ext import Application, CommandHandler, CallbackQueryHandler, ContextTypes, MessageHandler, filters

# KONFIGURASI
TOKEN = "8343206643:AAE2Z_1Ip4l8jdf71cQ3CxBx1Xkv-reFhqg"
OWNER_ID = 8028341598
user_vms = {}
user_data = {}
broadcast_messages = []

BANNER = """
╔══════════════════════════════════════════════════════════╗
║                                                          ║
║    ██╗   ██╗██████╗ ███████╗    ███╗   ███╗ █████╗ ███╗   ██╗
