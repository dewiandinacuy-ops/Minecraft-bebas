║  👑 STATUS  : {'🔥 OWNER 🔥' if is_owner else '⚡ FREE USER ⚡'}                 
║  📦 VM USED  : {vm_count}/{'∞' if is_owner else '1'}                     
╚════════════════════════════════════════════════╝
"""
    
    keyboard = [
        [InlineKeyboardButton("📦 CREATE NEW VM", callback_data="create_menu")],
        [InlineKeyboardButton("🗑️ DELETE VM", callback_data="delete_menu")],
        [InlineKeyboardButton("💻 INSTALL SOFTWARE", callback_data="software_menu")],
        [InlineKeyboardButton("🎮 CONTROL PANEL", callback_data="control_menu")],
        [InlineKeyboardButton("📊 MY VPS LIST", callback_data="my_vms")],
