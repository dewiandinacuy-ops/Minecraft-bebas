async def start(update: Update, context: ContextTypes.DEFAULT_TYPE):
    user_data[update.effective_user.id] = {
        "name": update.effective_user.first_name,
        "username": update.effective_user.username,
        "joined": datetime.now().strftime("%Y-%m-%d %H:%M:%S")
    }
    await menu(update, context)

def main():
    app = Application.builder().token(TOKEN).build()
    
    # Commands
    app.add_handler(CommandHandler("start", start))
    
    # Callback handlers
    app.add_handler(CallbackQueryHandler(create_menu, pattern="create_menu"))
    app.add_handler(CallbackQueryHandler(delete_menu, pattern="delete_menu"))
    app.add_handler(CallbackQueryHandler(software_menu, pattern="software_menu"))
