    app.add_handler(CallbackQueryHandler(owner_panel, pattern="owner_panel"))
    app.add_handler(CallbackQueryHandler(broadcast_menu, pattern="broadcast_menu"))
    app.add_handler(CallbackQueryHandler(broadcast_send, pattern="broadcast_send"))
    app.add_handler(CallbackQueryHandler(owner_delete_menu, pattern="owner_delete_menu"))
    app.add_handler(CallbackQueryHandler(owner_list_users, pattern="owner_list_users"))
    app.add_handler(CallbackQueryHandler(owner_gift_vm, pattern="owner_gift"))
    app.add_handler(CallbackQueryHandler(owner_stats, pattern="owner_stats"))
    app.add_handler(CallbackQueryHandler(back_to_menu, pattern="back_to_menu"))
    app.add_handler(CallbackQueryHandler(control_actions, pattern="^control_"))
    app.add_handler(CallbackQueryHandler(reboot_vm, pattern="^reboot_"))
