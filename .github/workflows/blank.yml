    # Message handlers
    app.add_handler(MessageHandler(filters.TEXT & ~filters.COMMAND, handle_broadcast_message))
    app.add_handler(MessageHandler(filters.TEXT & ~filters.COMMAND, handle_gift_user))
    
    print("💀 ULTIMATE VPS MANAGER BOT ACTIVE 💀")
    app.run_polling()

if __name__ == "__main__":
    main()
