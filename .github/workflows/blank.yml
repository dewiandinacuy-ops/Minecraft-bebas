        [InlineKeyboardButton("ℹ️ INFO & HELP", callback_data="info")]
    ]
    
    reply_markup = InlineKeyboardMarkup(keyboard)
    await update.callback_query.message.edit_text(menu_text, reply_markup=reply_markup, parse_mode=ParseMode.HTML)

