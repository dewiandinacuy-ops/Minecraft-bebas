        await update.callback_query.message.edit_text("⚠️ Kamu belum punya VM!")
        return
    
    keyboard = []
    for vm in vms:
        keyboard.append([InlineKeyboardButton(f"🎮 {vm['name']}", callback_data=f"control_{vm['name']}")])
    keyboard.append([InlineKeyboardButton("◀️ BACK", callback_data="back_to_menu")])
    
    reply_markup = InlineKeyboardMarkup(keyboard)
    await update.callback_query.message.edit_text("🎮 Pilih VM yang mau dikontrol:", reply_markup=reply_markup)

