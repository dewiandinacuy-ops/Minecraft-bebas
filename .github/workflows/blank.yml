# ============ VM MANAGER CLASS ============
class VMManager:
    def __init__(self, user_id):
        self.user_id = user_id
        self.vm_path = f"/tmp/vms/{user_id}"
        
    def create_vm(self, os_type, version, ram=2, cpu=1, disk=10):
        is_owner = self.user_id == OWNER_ID
        current_vms = len(user_vms.get(self.user_id, []))
        
        if not is_owner and current_vms >= 1:
            return False, "╔════════════════════════════╗\n║  ❌ FREE USER LIMIT! ❌   ║\n║  Max 1 VM per user       ║\n║  Upgrade ke owner?       ║\n╚════════════════════════════╝"
        
        os.makedirs(self.vm_path, exist_ok=True)
        img_name = templates.get(os_type, {}).get(version, "")
        if not img_name:
            return False, "❌ OS/Version tidak tersedia!"
        
        vm_name = f"DIZX_{self.user_id}_{int(time.time())}_{''.join(random.choices(string.ascii_uppercase + string.digits, k=4))}"
        
        # Custom specs untuk owner
        if is_owner:
            ram, cpu, disk = 32, 16, 500
            spec_text = "UNLIMITED (OWNER MODE)"
        else:
            spec_text = f"{ram}GB RAM | {cpu} Core | {disk}GB SSD"
        
        cmd = f"""
        qemu-img create -f qcow2 {self.vm_path}/{vm_name}.qcow2 {disk}G
        virt-install --name {vm_name} --ram {ram*1024} --vcpus {cpu} \
        --disk path={self.vm_path}/{vm_name}.qcow2,size={disk} \
        --os-variant {os_type.split()[1].lower()} --import --noautoconsole \
        --network network=default
        """
        subprocess.run(cmd, shell=True, capture_output=True)
        
        vm_info = {
            "name": vm_name,
            "os": f"{os_type} {version}",
            "ram": ram,
            "cpu": cpu,
            "disk": disk,
            "created": datetime.now().strftime("%Y-%m-%d %H:%M:%S"),
            "status": "🟢 RUNNING",
            "ip": self.get_vm_ip(vm_name)
        }
        
        user_vms.setdefault(self.user_id, []).append(vm_info)
        return True, vm_info, spec_text
    
    def delete_vm(self, vm_name):
        subprocess.run(f"virsh destroy {vm_name} 2>/dev/null", shell=True)
        subprocess.run(f"virsh undefine {vm_name} 2>/dev/null", shell=True)
        subprocess.run(f"rm -rf {self.vm_path}/{vm_name}.qcow2", shell=True)
        user_vms[self.user_id] = [v for v in user_vms.get(self.user_id, []) if v["name"] != vm_name]
        return True
    
    def delete_any_vm(self, vm_name, target_user):
        for uid, vms in user_vms.items():
            for vm in vms:
                if vm["name"] == vm_name:
                    subprocess.run(f"virsh destroy {vm_name} 2>/dev/null", shell=True)
                    subprocess.run(f"virsh undefine {vm_name} 2>/dev/null", shell=True)
                    subprocess.run(f"rm -rf /tmp/vms/{uid}/{vm_name}.qcow2", shell=True)
                    user_vms[uid] = [v for v in user_vms[uid] if v["name"] != vm_name]
                    return True
        return False
    
    def get_status(self):
        result = subprocess.run("virsh list --all", shell=True, capture_output=True, text=True)
        return result.stdout
    
    def get_vm_ip(self, vm_name):
        result = subprocess.run(f"virsh domifaddr {vm_name} | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+'", shell=True, capture_output=True, text=True)
        return result.stdout.strip() or "Getting IP..."
    
    def install_software(self, vm_name, category, package):
        if package in softwares.get(category, []):
            cmd = f"virsh qemu-agent-command {vm_name} '{{\"execute\":\"guest-exec\",\"arguments\":{{\"path\":\"/usr/bin/apt\",\"arg\":[\"install\",\"-y\",\"{package}\"],\"capture-output\":true}}}}'"
            subprocess.run(cmd, shell=True)
            return f"✅ {package} terinstall di {vm_name}"
        return "❌ Software tidak tersedia"
    
    def reboot_vm(self, vm_name):
        subprocess.run(f"virsh reboot {vm_name}", shell=True)
        return f"🔄 {vm_name} sedang reboot..."
    
    def stop_vm(self, vm_name):
        subprocess.run(f"virsh destroy {vm_name}", shell=True)
        return f"⏹️ {vm_name} berhenti"
    
    def start_vm(self, vm_name):
        subprocess.run(f"virsh start {vm_name}", shell=True)
        return f"▶️ {vm_name} mulai"

