async def handle_broadcast_message(update: Update, context: ContextTypes.DEFAULT_TYPE):
    if context.user_data.get("awaiting_broadcast") and update.effective_user.id == OWNER_ID:
        broadcast_msg = update.message.text
        sender = update.effective_user
        
        broadcast_data = {
            "id": len(broadcast_messages) + 1,
            "message": broadcast_msg,
            "sender": sender.first_name,
            "sender_id": sender.id,
            "time": datetime.now().strftime("%Y-%m-%d %H:%M:%S"),
            "total_sent": 0
        }
        
        # Kirim ke semua user yang pernah interaksi
        sent_count = 0
        for user_id in user_data.keys():
            try:
                await context.bot.send_message(
                    chat_id=user_id,
                    text=f"╔════════════════════════════╗\n"
                         f"║    📢 OFFICIAL BROADCAST   ║\n"
                         f"╠════════════════════════════╣\n"
                         f"║  From: {sender.first_name}   ║\n"
                         f"║  Time: {broadcast_data['time']}  ║\n"
                         f"╠════════════════════════════╣\n"
                         f"║  {broadcast_msg}\n"
                         f"╚════════════════════════════╝"
                )
                sent_count += 1
            except:
                pass
        
        broadcast_data["total_sent"] = sent_count
        broadcast_messages.append(broadcast_data)
        
        await update.message.reply_text(f"✅ Broadcast terkirim ke {sent_count} user!")
        context.user_data["awaiting_broadcast"] = False

